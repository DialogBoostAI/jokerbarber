<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker Barber — Panel Admina</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --red:   #D04133;
      --blue:  #3A7BB3;
      --dark:  #0D0D0D;
      --dark2: #111111;
      --dark3: #1A1A1A;
      --dark4: #222222;
      --light: #F5F0E8;
      --text:  #C8C0B5;
      --muted: #6A6A6A;
      --border: #2A2A2A;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Login ── */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }
    .login-logo span { color: var(--red); }
    .login-sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .login-box input[type="password"] {
      width: 100%;
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.85rem 1rem;
      color: var(--light);
      font-family: 'Montserrat', sans-serif;
      font-size: 1rem;
      outline: none;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .login-box input[type="password"]:focus { border-color: var(--red); }
    .btn-login {
      width: 100%;
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.85; }
    .login-error {
      color: var(--red);
      font-size: 0.85rem;
      margin-top: 0.75rem;
      min-height: 1.2em;
    }

    /* ── Admin Panel ── */
    #adminPanel { display: none; }
    .admin-header {
      background: var(--dark2);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .admin-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.08em;
    }
    .admin-title span { color: var(--red); }
    .btn-logout {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    .admin-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 2rem 4rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      margin-top: 2.5rem;
    }
    .section-header:first-child { margin-top: 0; }
    .section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-red  { background: var(--red); }
    .dot-blue { background: var(--blue); }
    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      color: var(--light);
    }

    .field-group {
      background: var(--dark3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      margin-bottom: 0.5rem;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .field input,
    .field textarea {
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--light);
      font-family: 'Montserrat', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    .field input:focus,
    .field textarea:focus { border-color: var(--blue); }
    .field textarea { min-height: 80px; line-height: 1.5; }

    .hours-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }
    @media (max-width: 600px) { .hours-row { grid-template-columns: 1fr; } }

    /* ── Save bar ── */
    .save-bar {
      position: sticky;
      bottom: 0;
      background: var(--dark2);
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 3rem;
    }
    .save-status {
      font-size: 0.85rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    .save-status.ok    { color: #4CAF50; }
    .save-status.error { color: var(--red); }
    .save-status.saving { color: var(--blue); }
    .btn-save {
      background: var(--red);
      color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      padding: 0.8rem 2.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .btn-save:hover:not(:disabled) { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    .note {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.5rem;
      padding: 0.6rem 0.9rem;
      background: var(--dark4);
      border-radius: 6px;
      border-left: 2px solid var(--blue);
    }
  </style>
</head>
<body>

  <!-- Login screen -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">JOKER <span>BARBER</span></div>
      <div class="login-sub">Panel Administracyjny</div>
      <input type="password" id="passwordInput" placeholder="Hasło" autocomplete="current-password" />
      <button class="btn-login" id="loginBtn">ZALOGUJ SIĘ</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Admin panel -->
  <div id="adminPanel">
    <header class="admin-header">
      <div class="admin-title">JOKER <span>BARBER</span> — ADMIN</div>
      <button class="btn-logout" id="logoutBtn">Wyloguj</button>
    </header>

    <div class="admin-body">

      <!-- HERO -->
      <div class="section-header">
        <div class="section-dot dot-red"></div>
        <span class="section-label">Sekcja Hero</span>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Nagłówek — linia 1</label>
          <input type="text" id="f_hero-headline-left" />
        </div>
        <div class="field">
          <label>Nagłówek — linia 2</label>
          <input type="text" id="f_hero-headline-right" />
        </div>
        <div class="field">
          <label>Podtytuł (można używać &lt;br /&gt; dla nowej linii)</label>
          <textarea id="f_hero-subline"></textarea>
        </div>
      </div>

      <!-- O NAS -->
      <div class="section-header">
        <div class="section-dot dot-blue"></div>
        <span class="section-label">O Nas</span>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Akapit 1</label>
          <textarea id="f_about-p1"></textarea>
        </div>
        <div class="field">
          <label>Akapit 2</label>
          <textarea id="f_about-p2"></textarea>
        </div>
      </div>

      <!-- GODZINY -->
      <div class="section-header">
        <div class="section-dot dot-red"></div>
        <span class="section-label">Godziny Otwarcia</span>
      </div>
      <div class="field-group">
        <div class="hours-row">
          <div class="field">
            <label>Poniedziałek – Piątek</label>
            <input type="text" id="f_hours-weekday" placeholder="9:00–20:00" />
          </div>
          <div class="field">
            <label>Sobota</label>
            <input type="text" id="f_hours-saturday" placeholder="9:00–18:00" />
          </div>
          <div class="field">
            <label>Niedziela</label>
            <input type="text" id="f_hours-sunday" placeholder="ZAMKNIĘTE" />
          </div>
        </div>
      </div>

      <!-- KONTAKT -->
      <div class="section-header">
        <div class="section-dot dot-blue"></div>
        <span class="section-label">Kontakt</span>
      </div>
      <div class="field-group">
        <div class="field">
          <label>Numer telefonu (tylko cyfry, bez +48)</label>
          <input type="text" id="f_contact-phone" placeholder="661 359 912" />
        </div>
      </div>

      <div class="note">
        Po kliknięciu „Zapisz" zmiany trafią do GitHub, a strona zostanie automatycznie przebudowana przez Vercel (ok. 1 minuty).
      </div>

    </div>

    <!-- Save bar -->
    <div class="save-bar">
      <div class="save-status" id="saveStatus"></div>
      <button class="btn-save" id="saveBtn">ZAPISZ ZMIANY</button>
    </div>
  </div>

  <script>
    // ── Keys that match EDITABLE markers in index.html ──
    const FIELDS = [
      'hero-headline-left',
      'hero-headline-right',
      'hero-subline',
      'about-p1',
      'about-p2',
      'hours-weekday',
      'hours-saturday',
      'hours-sunday',
      'contact-phone',
    ];

    // ── Auth (session only) ──
    let sessionPassword = null;

    function showPanel() {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display  = 'block';
      loadCurrentContent();
    }

    function showLogin() {
      sessionPassword = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('adminPanel').style.display  = 'none';
      document.getElementById('passwordInput').value = '';
    }

    document.getElementById('loginBtn').addEventListener('click', tryLogin);
    document.getElementById('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') tryLogin();
    });

    async function tryLogin() {
      const pw = document.getElementById('passwordInput').value.trim();
      if (!pw) return;
      document.getElementById('loginError').textContent = '';
      document.getElementById('loginBtn').disabled = true;

      // Quick test: try to save nothing to verify password
      const res = await fetch('/api/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, fields: {} }),
      });

      document.getElementById('loginBtn').disabled = false;

      if (res.ok) {
        sessionPassword = pw;
        showPanel();
      } else {
        const data = await res.json().catch(() => ({}));
        document.getElementById('loginError').textContent =
          data.error || 'Błąd logowania';
      }
    }

    document.getElementById('logoutBtn').addEventListener('click', showLogin);

    // ── Load current content from index.html via GitHub raw ──
    async function loadCurrentContent() {
      try {
        const res = await fetch('/index.html?nocache=' + Date.now());
        const html = await res.text();
        for (const key of FIELDS) {
          const regex = new RegExp(
            `<!-- EDITABLE:${key} -->([\\s\\S]*?)<!-- /EDITABLE:${key} -->`, 'm'
          );
          const match = html.match(regex);
          const el = document.getElementById('f_' + key);
          if (el && match) el.value = match[1].trim();
        }
      } catch (e) {
        setStatus('Nie udało się załadować treści: ' + e.message, 'error');
      }
    }

    // ── Save ──
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const fields = {};
      for (const key of FIELDS) {
        const el = document.getElementById('f_' + key);
        if (el) fields[key] = el.value;
      }

      setStatus('Zapisywanie…', 'saving');
      document.getElementById('saveBtn').disabled = true;

      try {
        const res = await fetch('/api/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: sessionPassword, fields }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok) {
          setStatus('Zapisano! Strona przebuduje się w ok. 60 sekund.', 'ok');
        } else {
          setStatus('Błąd: ' + (data.error || res.status), 'error');
        }
      } catch (e) {
        setStatus('Błąd sieci: ' + e.message, 'error');
      } finally {
        document.getElementById('saveBtn').disabled = false;
      }
    });

    function setStatus(msg, type) {
      const el = document.getElementById('saveStatus');
      el.textContent = msg;
      el.className = 'save-status ' + (type || '');
    }
  </script>
</body>
</html>
